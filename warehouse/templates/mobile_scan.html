<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TSD Mobile | Релакс Тайм</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: monospace; }
        .tsd-card { border: 1px solid #00ff00; background: #000; border-radius: 5px; margin-bottom: 10px; padding: 10px; }
        .btn-scan { background-color: #00ff00; color: #000; font-weight: bold; width: 100%; padding: 15px; }
        .header { border-bottom: 2px solid #00ff00; padding: 10px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h5>LOGISTICS TSD v1.0</h5>
    <small>ID: SHMIDT-AIR-A1466</small>
</div>

<div class="container">
    <p class="text-uppercase small">Заказы в очереди (Pick List):</p>
    {% for order in orders %}
    <div class="tsd-card">
        <div>ID: #{{ order.id }} | <strong>{{ order.sku.name }}</strong></div>
        <div class="small">Ячейка: {{ order.bin.bin_code }}</div>
        <button class="btn btn-sm btn-outline-success mt-2 w-100">ПОДТВЕРДИТЬ ПОДБОР</button>
    </div>
    {% empty %}
    <p class="text-center text-muted">Очередь пуста</p>
    {% endfor %}
    
    <div class="mt-4">
        <button class="btn-scan" onclick="alert('Камера активирована. Ожидание штрих-кода...')">СКАНИРОВАТЬ SKU</button>
    </div>
</div>

</body>
</html>
